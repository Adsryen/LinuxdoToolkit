<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinuxdoToolkit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="popup-header">
    <div class="header-left">
      <img src="../../public/icons/icon48.png" alt="Logo">
      <h1>LinuxdoToolkit</h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-refresh" title="刷新">🔄</button>
      <button class="icon-btn" id="btn-options" title="设置">⚙️</button>
    </div>
  </header>

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">正在连接...</span>
  </div>

  <!-- Module List -->
  <div class="module-list" id="module-list">
    <div class="loading">加载中...</div>
  </div>

  <!-- Footer -->
  <footer class="popup-footer">
    <a href="https://github.com/Adsryen/LinuxdoToolkit" target="_blank" class="footer-link">GitHub</a>
    <span class="footer-sep">·</span>
    <a href="#" id="link-options" class="footer-link">设置</a>
    <span class="footer-sep">·</span>
    <span class="footer-link" id="version-text">v1.0.0</span>
  </footer>

  <script src="index.js" type="module"></script>
</body>
</html>
